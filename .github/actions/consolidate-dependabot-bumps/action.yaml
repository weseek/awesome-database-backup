name: Consolidate dependabot bump entries
description: >
  Consolidates release-drafter changelog entries that bump the same
  package by the same author into a single line spanning the overall version range.

inputs:
  body:
    description: Release notes body generated by release-drafter
    required: true
  authors:
    description: Comma-separated whitelist of author name substrings whose bump entries are consolidated
    required: false
    default: dependabot

outputs:
  body:
    description: Release notes body with dependabot bump entries consolidated
    value: ${{ steps.consolidate.outputs.body }}

runs:
  using: composite
  steps:
  - name: Consolidate dependabot bump entries
    id: consolidate
    shell: bash
    working-directory: ${{ github.action_path }}
    env:
      RELEASE_BODY: ${{ inputs.body }}
      AUTHORS: ${{ inputs.authors }}
    run: npx --yes tsx@4 cli.ts
